<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Project Detail｜Zhao</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<header class="site-header">
  <a class="logo" href="index.html">Zhao</a>
  <nav class="nav">
    <button class="nav-toggle" aria-label="menu">
      <span class="hamburger"></span>
    </button>
    <ul>
      <li><a href="index.html">主页</a></li>
      <li><a href="works.html" class="active">作品</a></li>
      <li><a href="about.html">作者简介</a></li>
      <li><a href="contact.html">联系方式</a></li>
    </ul>
  </nav>
</header>

<main class="project">
  <nav class="breadcrumb">
    <a href="works.html">作品</a>
    <span class="sep">/</span>
    <span id="projectTitleCrumb">Project Detail</span>
  </nav>

  <header class="project-head">
    <h1 id="projectTitle">项目标题</h1>
    <p class="muted" id="projectSub">分类 · 年份</p>
  </header>

  <!-- 核心展示区域，支持多图浏览 -->
  <section class="project-media">
    <button class="btn-icon" id="btnPrev" aria-label="Prev">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>

    <div class="carousel" id="mediaCarousel">
      <div class="carousel-track" id="carouselTrack">
        <!-- JS 注入图片项 -->
      </div>
    </div>

    <button class="btn-icon" id="btnNext" aria-label="Next">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>

    <div class="carousel-controls">
      <div class="carousel-dots" id="carouselDots"></div>
    </div>
  </section>

  <!-- 项目信息 -->
  <section class="project-info">
    <div class="info-block">
      <h3>项目简介</h3>
      <p id="projectDesc">这是项目简要说明。描述创作背景、设计思路以及解决的美术挑战。</p>
    </div>
    <div class="info-grid">
      <div>
        <h4>职责</h4>
        <ul id="projectRole" class="list">
          <li>高模雕刻</li><li>建模与拓扑</li><li>贴图与渲染</li>
        </ul>
      </div>
      <div>
        <h4>工具</h4>
        <ul id="projectTools" class="list">
          <li>ZBrush</li><li>Maya</li><li>Substance Painter</li>
        </ul>
      </div>
      <div>
        <h4>时间</h4>
        <p id="projectTime" class="list">2025</p>
      </div>
    </div>
  </section>

  <nav class="project-nav">
    <a href="works.html" class="btn btn-ghost">← 返回作品集</a>
  </nav>
</main>

<footer class="site-footer">
  <p>© 2026 Zhao. All rights reserved.</p>
</footer>

<script src="assets/js/main.js"></script>
</body>
</html>

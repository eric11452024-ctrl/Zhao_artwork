<body>
<header class="site-header">
  <a class="logo" href="index.html">Zhao</a>
  <nav class="nav">
    <button class="nav-toggle" aria-label="menu">
      <span class="hamburger"></span>

<main class="page-narrow">
  <header class="page-head">
    <h1>作品</h1>
    <p class="muted">以项目为单位展示，点击进入查看过程与细节。</p>
  </header>

  <!-- 分类与排序控制栏 -->
  <div class="controls-bar">
    <div class="filters" id="workFilters">
      <button class="chip is-active" data-filter="all">全部</button>
      <button class="chip" data-filter="prop">道具</button>
      <button class="chip" data-filter="scene">场景</button>
    </div>

    <div class="sort-box">
      <select id="workSort" class="sort-select">
        <option value="newest">最新优先</option>
        <option value="oldest">最早优先</option>
      </select>
    </div>
  </div>

  <!-- 项目卡片网格 -->
  <section class="cards-grid" id="workGrid">
    <a class="card" href="project.html?id=dragon-sculpt" data-cat="prop" data-year="202603">
      <div class="card-img-wrap">
        <img src="artwork_picture/artwork_cover/test/dragon_show1_low.png" alt="龙｜雕刻练习" loading="lazy">
      </div>
      <div class="card-meta">
        <h3>龙｜雕刻练习</h3>
        <p>雕刻类资产</p>
      </div>
    </a>

    <a class="card" href="project.html?id=altar-prop" data-cat="scene" data-year="202502">
      <div class="card-img-wrap">
        <img src="artwork_picture/artwork_cover/test/table_show1_low.png" alt="供台｜场景资产" loading="lazy">
      </div>
      <div class="card-meta">
        <h3>供台｜场景资产</h3>
        <p>氛围型道具</p>
      </div>
    </a>

    <a class="card" href="project.html?id=mechanism-relic" data-cat="prop" data-year="202508">
      <div class="card-img-wrap">
        <img src="artwork_picture/artwork_cover/test/biggun_show1_low.png" alt="永劫无间｜莲心剑雨｜武器建模" loading="lazy">
      </div>
      <div class="card-meta">
        <h3>永劫无间｜莲心剑雨｜武器建模</h3>
        <p>武器 · 道具</p>
      </div>
    </a>

    <a class="card" href="project.html?id=demon-blade" data-cat="prop" data-year="202512">
      <div class="card-img-wrap">
        <img src="artwork_picture/artwork_cover/test/sword_show1_low.png" alt="永劫无间｜谪星狼主｜武器建模" loading="lazy">
      </div>
      <div class="card-meta">
        <h3>永劫无间｜谪星狼主｜武器建模</h3>
        <p>武器设计</p>
      </div>
    </a>

    <a class="card" href="project.html?id=snake-staff" data-cat="prop" data-year="202504">
      <div class="card-img-wrap">
        <img src="artwork_picture/artwork_cover/test/snake_show1_low.png" alt="蛇杖｜武器建模" loading="lazy">
      </div>
      <div class="card-meta">
        <h3>蛇杖｜武器建模</h3>
        <p>雕刻 · 武器</p>
      </div>
    </a>

    <a class="card" href="project.html?id=retro-clock" data-cat="prop" data-year="202510">
      <div class="card-img-wrap">
        <img src="artwork_picture/artwork_cover/test/clock_show1_low.png" alt="复古座钟｜场景道具" loading="lazy">
      </div>
      <div class="card-meta">
        <h3>复古座钟｜场景道具</h3>

      </div>
